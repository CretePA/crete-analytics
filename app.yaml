command:
  - node
  - .next/standalone/server.js

env:
  - name: DATABRICKS_WAREHOUSE_ID
    description: "SQL Warehouse ID for executing queries"
    value: "351f57fd45a3f387"
  - name: DATABRICKS_HOST
    description: "Databricks workspace hostname"
    value: "adb-7405618890836566.6.azuredatabricks.net"
  - name: GENIE_SPACE_ID
    description: "Genie AI/BI space ID"
    value: "01f110cdac7311b39cb3e6f5d6a6d283"
  - name: PORT
    description: "Port for the web server"
    value: "8000"

resources:
  - name: sql-warehouse
    type: sql-warehouse
    description: "SQL Warehouse for Crete Analytics queries"
  - name: genie-space
    type: genie-space
    description: "Genie AI/BI space for natural language queries"
